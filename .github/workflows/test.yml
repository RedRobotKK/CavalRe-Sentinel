name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies (root)
        run: npm install

      - name: Install dependencies (floatlib-ts)
        run: npm install
        working-directory: ./floatlib-ts

      - name: Install dependencies (ledger-ts)
        run: npm install
        working-directory: ./ledger-ts

      - name: Install dependencies (risk-engine)
        run: npm install
        working-directory: ./risk-engine

      - name: TypeScript check (floatlib-ts)
        run: npm run typecheck
        working-directory: ./floatlib-ts

      - name: TypeScript check (ledger-ts)
        run: npm run typecheck
        working-directory: ./ledger-ts

      - name: TypeScript check (risk-engine)
        run: npm run typecheck
        working-directory: ./risk-engine

      - name: Lint (floatlib-ts)
        run: npm run lint --if-present
        working-directory: ./floatlib-ts

      - name: Lint (ledger-ts)
        run: npm run lint --if-present
        working-directory: ./ledger-ts

      - name: Lint (risk-engine)
        run: npm run lint --if-present
        working-directory: ./risk-engine

      - name: Test (floatlib-ts)
        run: npm test
        working-directory: ./floatlib-ts

      - name: Test (ledger-ts)
        run: npm test
        working-directory: ./ledger-ts

      - name: Test (risk-engine)
        run: npm test
        working-directory: ./risk-engine

      - name: Coverage (floatlib-ts)
        run: npm run test:coverage --if-present
        working-directory: ./floatlib-ts

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./floatlib-ts/coverage/coverage-final.json,./ledger-ts/coverage/coverage-final.json,./risk-engine/coverage/coverage-final.json
          fail_ci_if_error: false
